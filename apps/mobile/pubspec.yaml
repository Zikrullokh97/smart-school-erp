name: smart_school_mobile
description: Flutter mobile client for Smart School Cloud ERP.
publish_to: "none"
version: 0.9.0+9

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  connectivity_plus: ^6.1.5
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^10.3.1
  go_router: ^16.3.0
  http: ^1.5.0
  intl: ^0.20.2
  path: ^1.9.1
  shared_preferences: ^2.5.3
  sqflite: ^2.4.3
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.26.3

flutter:
  uses-material-design: true
